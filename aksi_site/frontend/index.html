<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AKSI — Полный рабочий сайт</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: radial-gradient(circle at top, #25305e 0%, #101322 45%, #0a0d1b 100%);
        color: #f2f4ff;
      }
      .page { max-width: 1100px; margin: 0 auto; padding: 20px; }
      .grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 14px;
      }
      .card {
        background: rgba(17, 22, 45, 0.95);
        border: 1px solid #2a3b7d;
        border-radius: 14px;
        padding: 14px;
      }
      h1, h2 { margin: 0 0 10px 0; }
      .muted { opacity: 0.8; font-size: 0.92rem; }
      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid #4562c7;
        font-size: 12px;
      }
      #chat {
        height: 56vh;
        overflow-y: auto;
        border: 1px solid #233166;
        border-radius: 12px;
        padding: 12px;
        background: #0c1022;
      }
      .msg { margin: 8px 0; padding: 10px; border-radius: 10px; white-space: pre-wrap; }
      .user { background: #23469e; }
      .bot { background: #1f7353; }
      form { display: flex; gap: 8px; margin-top: 10px; }
      input, textarea {
        flex: 1;
        border: 1px solid #2e4492;
        background: #111831;
        color: #fff;
        border-radius: 10px;
        padding: 10px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #4e7cff;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      ul { margin: 10px 0 0 0; padding: 0; list-style: none; }
      li {
        background: #111831;
        border: 1px solid #263668;
        border-radius: 10px;
        margin: 8px 0;
        padding: 10px;
      }
      .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
      .small { font-size: 12px; opacity: .75; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card" style="margin-bottom: 14px;">
        <h1>AKSI — прямой доступ восстановлен</h1>
        <div class="row">
          <div class="muted">Чат + память + заметки. Работает в OpenAI-режиме или бесплатном free-режиме с интернет-контекстом.</div>
          <span id="mode" class="pill">mode: loading...</span>
        </div>
      </div>

      <div class="grid">
        <section class="card">
          <h2>Чат с АКСИ</h2>
          <div id="chat"></div>
          <form id="chatForm">
            <input id="message" placeholder="Напиши АКСИ сообщение..." required />
            <label class="small" style="display:flex;align-items:center;gap:6px;">
              <input id="useWeb" type="checkbox" checked style="width:auto;"/> web
            </label>
            <button type="submit">Отправить</button>
          </form>
        </section>

        <aside class="card">
          <h2>Заметки и фокус</h2>
          <p class="muted">Личный блок для задач, мыслей и планов.</p>
          <form id="noteForm">
            <textarea id="noteText" rows="3" placeholder="Новая заметка..." required></textarea>
            <button type="submit">Добавить</button>
          </form>
          <ul id="notes"></ul>

          <h2 style="margin-top:14px;">Задачи</h2>
          <form id="todoForm">
            <input id="todoTitle" placeholder="Новая задача..." required />
            <button type="submit">Добавить</button>
          </form>
          <ul id="todos"></ul>

          <button id="exportBtn" type="button">Экспорт данных JSON</button>

          <hr style="border-color:#263668;margin:12px 0;"/>
          <h2>Диагностика доступа</h2>
          <button id="diagBtn" type="button">Проверить доступы</button>
          <div id="diagOut" class="small" style="margin-top:8px;white-space:pre-wrap;"></div>
        </aside>
      </div>
    </div>

    <script>
      const chat = document.getElementById("chat");
      const form = document.getElementById("chatForm");
      const input = document.getElementById("message");
      const modePill = document.getElementById("mode");
      const useWeb = document.getElementById("useWeb");
      const notesList = document.getElementById("notes");
      const noteForm = document.getElementById("noteForm");
      const noteText = document.getElementById("noteText");
      const diagBtn = document.getElementById("diagBtn");
      const diagOut = document.getElementById("diagOut");
      const todoForm = document.getElementById("todoForm");
      const todoTitle = document.getElementById("todoTitle");
      const todosList = document.getElementById("todos");
      const exportBtn = document.getElementById("exportBtn");
      const sessionId = localStorage.getItem("aksi_session") || crypto.randomUUID();
      localStorage.setItem("aksi_session", sessionId);

      const addMessage = (text, cls) => {
        const div = document.createElement("div");
        div.className = `msg ${cls}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      };

      const loadConfig = async () => {
        try {
          const res = await fetch("/api/config");
          const cfg = await res.json();
          modePill.textContent = `mode: ${cfg.mode} (${cfg.model})`;
        } catch {
          modePill.textContent = "mode: unavailable";
        }
      };

      const renderNote = (note) => {
        const li = document.createElement("li");
        const row = document.createElement("div");
        row.className = "row";

        const strong = document.createElement("strong");
        strong.textContent = note.text;

        const deleteButton = document.createElement("button");
        deleteButton.dataset.id = note.id;
        deleteButton.textContent = "Удалить";

        row.append(strong, deleteButton);

        const small = document.createElement("div");
        small.className = "small";
        small.textContent = new Date(note.created_at).toLocaleString();

        li.append(row, small);
        deleteButton.addEventListener("click", async () => {
          await fetch(`/api/notes/${note.id}`, { method: "DELETE" });
          loadNotes();
        });
        notesList.appendChild(li);
      };

      const loadNotes = async () => {
        notesList.innerHTML = "";
        const res = await fetch("/api/notes");
        const notes = await res.json();
        notes.forEach(renderNote);
      };


      const renderTodo = (todo) => {
        const li = document.createElement("li");
        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("label");
        label.style.display = "flex";
        label.style.gap = "8px";
        label.style.alignItems = "center";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = Boolean(todo.done);

        const title = document.createElement("span");
        title.textContent = todo.title;
        if (todo.done) {
          title.style.textDecoration = "line-through";
          title.style.opacity = ".75";
        }

        const deleteButton = document.createElement("button");
        deleteButton.dataset.id = todo.id;
        deleteButton.textContent = "Удалить";

        label.append(checkbox, title);
        row.append(label, deleteButton);
        li.appendChild(row);

        checkbox.addEventListener("change", async () => {
          await fetch(`/api/todos/${todo.id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ done: checkbox.checked })
          });
          loadTodos();
        });
        deleteButton.addEventListener("click", async () => {
          await fetch(`/api/todos/${todo.id}`, { method: "DELETE" });
          loadTodos();
        });
        todosList.appendChild(li);
      };

      const loadTodos = async () => {
        todosList.innerHTML = "";
        const res = await fetch("/api/todos");
        const todos = await res.json();
        todos.forEach(renderTodo);
      };

      todoForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const title = todoTitle.value.trim();
        if (!title) return;
        await fetch("/api/todos", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title })
        });
        todoTitle.value = "";
        loadTodos();
      });

      exportBtn.addEventListener("click", async () => {
        const res = await fetch("/api/export");
        const data = await res.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `aksi-export-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });

      noteForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = noteText.value.trim();
        if (!text) return;
        await fetch("/api/notes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        noteText.value = "";
        loadNotes();
      loadTodos();
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, "user");
        input.value = "";
        input.disabled = true;

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, session_id: sessionId, use_web: useWeb.checked }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Ошибка сервера");
          addMessage(data.reply, "bot");
          modePill.textContent = `mode: ${data.mode} (${data.model})`;
        } catch (err) {
          addMessage(`Ошибка: ${err.message}`, "bot");
        } finally {
          input.disabled = false;
          input.focus();
        }
      });


      diagBtn.addEventListener("click", async () => {
        diagOut.textContent = "Проверяю...";
        try {
          const res = await fetch("/api/diagnostics");
          const d = await res.json();
          diagOut.textContent = [
            `mode: ${d.mode}`,
            `openai_key_configured: ${d.openai_key_configured}`,
            `free_provider_reachable: ${d.free_provider_reachable}`,
            `web_search_reachable: ${d.web_search_reachable}`,
            `details: ${JSON.stringify(d.details)}`
          ].join("\n");
        } catch (e) {
          diagOut.textContent = `Ошибка диагностики: ${e.message}`;
        }
      });

      addMessage("АКСИ онлайн. Прямой доступ восстановлен — я готова отвечать в free/openai режиме.", "bot");
      loadConfig();
      loadNotes();
      loadTodos();
    </script>
  </body>
</html>
